services:
  masteragent:
    build:
      context: .
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-}
    # Port is managed by EasyPanel's docker-compose.override.yml.
    # For local/manual runs: docker run -p 8080:80 or set PORT env var.
    ports:
      - "${PORT:-8080}:80"

    environment:
      # JWT & Auth
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change_this_secret_in_production}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY:-}
      - STRICT_STARTUP_VALIDATION=${STRICT_STARTUP_VALIDATION:-false}
      - ALLOW_PUBLIC_SIGNUP=${ALLOW_PUBLIC_SIGNUP:-true}
      - ENFORCE_AGENT_SCOPE=${ENFORCE_AGENT_SCOPE:-false}
      - LEGACY_PROMPT_KEYS_GLOBAL=${LEGACY_PROMPT_KEYS_GLOBAL:-true}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@promptsrc.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - MCP_SERVICE_KEY=${MCP_SERVICE_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-}
      - FRONTEND_URL=${FRONTEND_URL:-}
      # Main app database (prompt manager)
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/memory}
      # Memory system: PostgreSQL + pgvector
      - MEMORY_POSTGRES_URL=${MEMORY_POSTGRES_URL:-postgresql://postgres:postgres@postgres:5432/memory}
      # Memory system: Redis cache
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - EMBEDDING_MAX_INPUT_CHARS=${EMBEDDING_MAX_INPUT_CHARS:-12000}
      # BullMQ retention. Keep completed/failed job records bounded.
      - BULL_REMOVE_ON_COMPLETE_COUNT=${BULL_REMOVE_ON_COMPLETE_COUNT:-1000}
      - BULL_REMOVE_ON_FAIL_COUNT=${BULL_REMOVE_ON_FAIL_COUNT:-1000}
      - PROVIDER_BATCH_ENABLED=${PROVIDER_BATCH_ENABLED:-true}
      - PROVIDER_BATCH_POLL_SECONDS=${PROVIDER_BATCH_POLL_SECONDS:-60}
      - PROVIDER_BATCH_DELETE_FILES_AFTER_IMPORT=${PROVIDER_BATCH_DELETE_FILES_AFTER_IMPORT:-true}
      - PROVIDER_BATCH_SNAPSHOT_MAX_RECORDS=${PROVIDER_BATCH_SNAPSHOT_MAX_RECORDS:-10000}
      - MAX_DOCUMENT_BYTES=${MAX_DOCUMENT_BYTES:-26214400}
      - ALLOW_PRIVATE_DOCUMENT_URLS=${ALLOW_PRIVATE_DOCUMENT_URLS:-false}
      - REQUIRE_WEBHOOK_TIMESTAMP=${REQUIRE_WEBHOOK_TIMESTAMP:-false}
      - LOGIN_MAX_ATTEMPTS=${LOGIN_MAX_ATTEMPTS:-10}
      # GLiNER NER Service (optional)
      - ENABLE_GLINER=${ENABLE_GLINER:-false}
      - GLINER_URL=${GLINER_URL:-http://gliner:8002}
    volumes:
      - promptsrc_data:/app/backend/data
      - promptsrc_prompts:/app/backend/local_prompts
      - promptsrc_db:/app/backend/db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    # Keep PostgreSQL maintenance operations from exhausting host memory.
    # Both values are configurable in the deployment environment.
    shm_size: ${POSTGRES_SHM_SIZE:-512m}
    mem_limit: ${POSTGRES_MEM_LIMIT:-4g}
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-memory}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-memory}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: >-
      redis-server --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-0}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-noeviction}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # GLiNER NER Service (optional - use profile to enable)
  # To start with GLiNER: docker-compose --profile gliner up -d
  gliner:
    profiles:
      - gliner
    build:
      context: ./gliner
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - gliner_cache:/root/.cache
    environment:
      - MODEL_NAME=${GLINER_MODEL:-urchade/gliner_multi}
    restart: unless-stopped

volumes:
  promptsrc_data:
  promptsrc_prompts:
  promptsrc_db:
  postgres_data:
  redis_data:
  gliner_cache:
